# ──────────────────────────────────────────────────────────────
# Usage (from DHIRL_bridge root):
#   python -m src_autotest.run src_autotest/configs/test_bridge.yaml --groups projection_width
# ──────────────────────────────────────────────────────────────


# We dig the potential of pgiavi, by testing hidden dims, RNN depth
defaults:
  num_states: 2048
  num_actions: 32
  data_dir: data_autotest/trajs

  ll_filename: ll.csv
  output_dir: src_autotest/outputs
  discount: 0.97
  num_repeats: 1
  num_latents: 3
  rand_seed: 42

  model_type: IntentionRNN
  hidden_dim: 128
  rnn_hidden_dim: 128
  num_layers: 1
  dropout: 0.2
  nhead: 4
  lr: 0.001

  reg_type: l1
  reg_weight: 0.0

  num_epochs: 1
  loss_threshold: 1e-3
  max_iterations: 150


groups:

  projection_width:
    id: G01
    description: "Scale input projection and RNN width together"
    experiments:
      - id: E01
        hidden_dim: 128
        rnn_hidden_dim: 128
      - id: E02
        hidden_dim: 256
        rnn_hidden_dim: 256
      - id: E03
        hidden_dim: 384
        rnn_hidden_dim: 384

  rnn_depth:
    id: G02
    description: "Test RNN depth for temporal modeling capacity"
    experiments:
      - id: E01
        hidden_dim: 256
        rnn_hidden_dim: 256
        num_layers: 1
      - id: E02
        hidden_dim: 256
        rnn_hidden_dim: 256
        num_layers: 2
      - id: E03 
        hidden_dim: 256
        rnn_hidden_dim: 256
        num_layers: 3

