# ──────────────────────────────────────────────────────────────
# Autotest config for src_autotest/train_bridge.py
#
# Usage (from DHIRL_bridge root):
#   python -m src_autotest.run src_autotest/configs/test_bridge.yaml --groups projection_width
#
# NOTE: trajs_NS_NA.json and trans_probs_NS_NA.npy must exist in data_dir
# ──────────────────────────────────────────────────────────────

defaults:
  num_states: 2048
  num_actions: 32
  data_dir: data_autotest/trajs

  ll_filename: ll.csv
  output_dir: src_autotest/outputs
  discount: 0.97
  num_repeats: 1
  num_latents: 3
  rand_seed: 42

  model_type: IntentionRNN
  embed_dim: 128
  rnn_embed_dim: 128
  num_layers: 1
  dropout: 0.2
  nhead: 4
  lr: 0.001

  reg_type: l1
  reg_weight: 0.0

  num_epochs: 1
  loss_threshold: 1e-3
  max_iterations: 150


groups:

  projection_width:
    id: G01
    description: "Scale input projection and RNN width together"
    experiments:
      - id: E01
        embed_dim: 256
        rnn_embed_dim: 256
      - id: E02
        embed_dim: 384
        rnn_embed_dim: 384
      - id: E03
        embed_dim: 512
        rnn_embed_dim: 512

  rnn_depth:
    id: G02
    description: "Test RNN depth for temporal modeling capacity"
    experiments:
      - id: E01
        embed_dim: 256
        rnn_embed_dim: 256
        num_layers: 1
      - id: E02
        embed_dim: 256
        rnn_embed_dim: 256
        num_layers: 2
      - id: E03 
        embed_dim: 256
        rnn_embed_dim: 256
        num_layers: 3

  state_scaling_final:
    id: G03
    description: "Validate best config across all state spaces"
    experiments:
      - id: E01
        embed_dim: 256
        rnn_embed_dim: 256
        num_layers: 2
        dropout: 0.1
      - id: E02
        embed_dim: 256
        rnn_embed_dim: 256
        num_layers: 2
        dropout: 0.2
      - id: E03 
        embed_dim: 256
        rnn_embed_dim: 256
        num_layers: 2
        dropout: 0.3
      - id: E04
        embed_dim: 256
        rnn_embed_dim: 256
        num_layers: 2
        dropout: 0.4

# ── G04: Disentangle projection vs RNN width ──────────────
  # GOAL: Isolate whether the bottleneck is in projection
  #   or in RNN hidden state. Vary one while fixing the other.
  # EXPECTED: If large embed_dim + small rnn helps → projection
  #   was the problem. If small embed_dim + large rnn helps →
  #   RNN capacity was the problem. Likely both matter.
  disentangle:
    id: G04
    description: "Separate projection width from RNN width"
    experiments:
      - id: E01
        embed_dim: 384
        rnn_embed_dim: 128
        num_layers: 1
      - id: E02
        embed_dim: 128
        rnn_embed_dim: 384
        num_layers: 1
      - id: E03
        embed_dim: 384
        rnn_embed_dim: 128
        num_layers: 2
      - id: E04
        embed_dim: 128
        rnn_embed_dim: 384
        num_layers: 2

  