# ──────────────────────────────────────────────────────────────
# Usage (from DHIRL_bridge root):
#   python -m src_autotest.run src_autotest/configs/test_0410_freshdata.yaml
# ──────────────────────────────────────────────────────────────

defaults:
  num_states: 2048
  num_actions: 32
  data_dir: ../discretes/trajs_viz/dinov2_small
  ll_filename: ll.csv
  output_dir: src_autotest/outputs_freshdata
  discount: 0.97
  num_repeats: 1
  num_latents: 5
  rand_seed: 42
  model_type: IntentionRNN
  hidden_dim: 128
  rnn_hidden_dim: 128
  num_layers: 1
  dropout: 0.2
  nhead: 4
  lr: 0.001
  reg_type: l1
  reg_weight: 0.0
  num_epochs: 1
  loss_threshold: 1e-3
  max_iterations: 150
  save_npy: 1

groups:
  fresh01:
    id: G01
    description: KL ablation
    experiments:
    - id: E1
      num_latents: 3
    - id: E2
      num_latents: 4
    - id: E3
      num_latents: 5
    - id: E4
      num_latents: 6
  
  fresh02:
    id: G02
    description: reg ablation
    experiments:
    - id: E1
      num_latents: 3
      reg_type: kl
      kl_weight: 1.50
    - id: E2
      num_latents: 3
      reg_type: l1
      reg_weight: 1.00
    - id: E3
      num_latents: 4
      reg_type: kl
      kl_weight: 1.50
    - id: E4
      num_latents: 4
      reg_type: l1
      reg_weight: 1.00
  