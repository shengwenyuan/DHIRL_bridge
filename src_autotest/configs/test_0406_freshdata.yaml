# ──────────────────────────────────────────────────────────────
# Usage (from DHIRL_bridge root):
#   python -m src_autotest.run src_autotest/configs/test_0406_freshdata.yaml
# ──────────────────────────────────────────────────────────────

# We train on branch v5060, where IAVI is greatly fastened by torch.linalg.pinv
defaults:
  num_states: 512
  num_actions: 32
  data_dir: ../discretes/trajs_viz/dinov2_small
  ll_filename: ll.csv
  output_dir: src_autotest/outputs_freshdata
  discount: 0.97
  num_repeats: 1
  num_latents: 5
  rand_seed: 42
  model_type: IntentionRNN
  hidden_dim: 128
  rnn_hidden_dim: 128
  num_layers: 1
  dropout: 0.2
  nhead: 4
  lr: 0.001
  reg_type: l1
  reg_weight: 0.0
  num_epochs: 1
  loss_threshold: 1e-3
  max_iterations: 150
  save_npy: 1

groups:
  fresh01:
    id: G01
    description: num epochs ablation
    experiments:
    - id: E1
      num_epochs: 1
    - id: E2
      num_epochs: 3
    - id: E3
      num_epochs: 5

  fresh02:
    id: G02
    description: hidden_dim ablation
    experiments:
    - id: E1
      hidden_dim: 64
    - id: E2
      hidden_dim: 256
  
  fresh03:
    id: G03
    description: rnn_hidden_dim ablation
    experiments:
    - id: E1
      rnn_hidden_dim: 64
    - id: E2
      rnn_hidden_dim: 256

  fresh04:
    id: G04
    description: num layers ablation
    experiments:
    - id: E1
      num_layers: 2
    - id: E2
      num_layers: 3
  
  fresh05:
    id: G05
    description: max iterations ablation
    experiments:
    - id: E1
      max_iterations: 100
    - id: E2
      max_iterations: 200