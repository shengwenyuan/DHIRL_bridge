defaults:
  num_states: 2048
  num_actions: 32
  data_dir: ../discretes/trajs_viz/dinov2_small

  ll_filename: ll.csv
  output_dir: src_autotest/outputs_freshdata
  discount: 0.97
  num_repeats: 1
  num_latents: 4
  rand_seed: 42

  model_type: IntentionRNN
  hidden_dim: 128
  rnn_hidden_dim: 128
  num_layers: 1
  dropout: 0.2
  nhead: 4
  lr: 0.001

  reg_type: l1
  reg_weight: 0.0

  num_epochs: 1
  loss_threshold: 1e-3
  max_iterations: 150
  save_npy: 0

