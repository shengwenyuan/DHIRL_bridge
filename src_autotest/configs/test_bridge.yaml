# ──────────────────────────────────────────────────────────────
# Autotest config for src_autotest/train_bridge.py
#
# Usage (from DHIRL_bridge root):
#   python -m src_autotest.run src_autotest/configs/test_bridge.yaml
#   python -m src_autotest.run src_autotest/configs/test_bridge.yaml --groups all_data_cases
#
# NOTE: trajs_NS_NA.json and trans_probs_NS_NA.npy must exist in data_dir
# ──────────────────────────────────────────────────────────────

defaults:
  num_states: 512
  num_actions: 32
  data_dir: data_autotest/trajs

  ll_filename: ll.csv
  output_dir: src_autotest/outputs
  discount: 0.97
  num_repeats: 1
  num_latents: 5
  rand_seed: 42

  model_type: IntentionRNN
  hidden_dim: 128
  rnn_hidden_dim: 128
  num_layers: 1
  dropout: 0.3
  nhead: 4
  lr: 0.001

  reg_type: l1
  reg_weight: 0.0

  num_epochs: 1
  loss_threshold: 0.01
  max_iterations: 150


# Each experiment only needs an id and the params that differ from defaults.
groups:

  # Traverse all (num_states, num_actions) data cases in data_autotest/.
  # Mirrors run_all_pgirl_autotest.py discover_cases() order.
  bridgeV2-contrastive-autotest:
    id: G01
    description: "All NS x NA data cases from data_autotest/trajs"
    experiments:
      - id: E01
        data_dir: data_autotest/trajs
        num_states: 384
        num_actions: 32
      - id: E02
        data_dir: data_autotest/trajs
        num_states: 512
        num_actions: 32
      - id: E03
        data_dir: data_autotest/trajs
        num_states: 640
        num_actions: 32
      - id: E04
        data_dir: data_autotest/trajs
        num_states: 768
        num_actions: 32
      - id: E05
        data_dir: data_autotest/trajs
        num_states: 1024
        num_actions: 32
  
  dinov2-autotest:
    id: G02
    description: "All NS x NA data cases from data_autotest/trajs_dinov2_*"
    experiments:
      - id: E01
        data_dir: data_autotest/trajs_dino_small
        num_states: 512
        num_actions: 32
      - id: E02
        data_dir: data_autotest/trajs_dino_base
        num_states: 512
        num_actions: 32
      - id: E03
        data_dir: data_autotest/trajs_dino_large
        num_states: 512
        num_actions: 32
      - id: E04
        data_dir: data_autotest/trajs_dino_giant
        num_states: 512
        num_actions: 32

  num_epochs:
    id: G03
    description: "Impact of number of training epochs per EM iteration"
    experiments:
      - id: E01
        num_epochs: 3
        rand_seed: 0
      - id: E02
        num_epochs: 3
        rand_seed: 42
      - id: E03
        num_epochs: 3
        rand_seed: 2026
      - id: E04
        num_epochs: 5
        rand_seed: 0
      - id: E05
        num_epochs: 5
        rand_seed: 42
      - id: E06
        num_epochs: 5
        rand_seed: 2026
      - id: E07
        num_epochs: 8
        rand_seed: 0
      - id: E08
        num_epochs: 8
        rand_seed: 42
      - id: E09
        num_epochs: 8
        rand_seed: 2026

  model_comparison:
    id: G04
    description: "RNN vs LSTM vs Transformer backbone"
    experiments:
      - id: E01
        model_type: IntentionRNN
        rand_seed: 0
      - id: E02
        model_type: IntentionRNN
        rand_seed: 42
      - id: E03
        model_type: IntentionRNN
        rand_seed: 2026
      - id: E04
        model_type: IntentionLSTM
        rand_seed: 0
      - id: E05
        model_type: IntentionLSTM
        rand_seed: 42
      - id: E06
        model_type: IntentionLSTM
        rand_seed: 2026
      - id: E07
        model_type: IntentionTransformer
        nhead: 4
        rand_seed: 0
      - id: E08
        model_type: IntentionTransformer
        nhead: 4
        rand_seed: 42
      - id: E09
        model_type: IntentionTransformer
        nhead: 4
        rand_seed: 2026