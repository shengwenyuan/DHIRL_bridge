# ──────────────────────────────────────────────────────────────
# Usage (from DHIRL_bridge root):
#   python -m src_autotest.run src_autotest/configs/test_0408_freshdata.yaml
# ──────────────────────────────────────────────────────────────

defaults:
  num_states: 512
  num_actions: 32
  data_dir: ../discretes/trajs_viz/dinov2_small
  ll_filename: ll.csv
  output_dir: src_autotest/outputs_freshdata
  discount: 0.97
  num_repeats: 1
  num_latents: 6
  rand_seed: 42
  model_type: IntentionRNN
  hidden_dim: 128
  rnn_hidden_dim: 128
  num_layers: 1
  dropout: 0.2
  nhead: 4
  lr: 0.001
  reg_type: l1
  reg_weight: 0.0
  num_epochs: 1
  loss_threshold: 1e-3
  max_iterations: 150
  save_npy: 1

groups:
  6intentions:
    id: G01
    description: reg ablation
    experiments:
    - id: E1
      reg_type: kl
      kl_weight: 1.20
    - id: E2
      reg_type: kl
      kl_weight: 1.50
    - id: E3
      reg_type: kl
      kl_weight: 2.00

    - id: E4
      reg_type: l1
      reg_weight: 0.75
    - id: E5
      reg_type: l1
      reg_weight: 1.25
    - id: E6
      reg_type: l1
      reg_weight: 1.75
